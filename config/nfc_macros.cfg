# =============================================================================
# EMU NFC Gate Reader — Happy Hare Integration Macros
# =============================================================================
# Include this file from printer.cfg alongside the supported hardware config:
#
#   [include NFC/nfc_vars.cfg]
#   [include NFC/nfc_macros.cfg]
#   [include NFC/pn532_i2C.cfg]
#
# Customise the GCode bodies here to match your Happy Hare version.  Do not put
# Happy Hare calls in PN532Driver or SpoolmanClient.
#
# Parameters passed by the nfc_gates / nfc_gate module:
#   _NFC_SPOOL_CHANGED : GATE (int)  SPOOL_ID (int)  UID (hex string)
#   _NFC_SPOOL_REMOVED : GATE (int)
#   _NFC_TAG_NO_SPOOL  : GATE (int)  UID (hex string)
#
# Integration model:
#   NFC_Manager reads the tag UID, asks SpoolmanClient to resolve it to a spool,
#   then dispatches these macros.  This macro file is the Happy Hare handoff.
#   _NFC_TAG_NO_SPOOL fires when a tag is detected but its UID is not registered
#   in Spoolman (the "rfid" extra field is missing or doesn't match).
# =============================================================================

[gcode_macro _NFC_SPOOL_CHANGED]
description: Called by nfc_gates/nfc_gate when a spool NFC tag is placed on a gate
gcode:
    {% set gate     = params.GATE     | int %}
    {% set spool_id = params.SPOOL_ID | int %}
    {% set uid      = params.UID %}
    { action_respond_info("😊 NFC gate %d: spool %d detected (UID %s). Sending to Happy Hare." % (gate, spool_id, uid)) }
    MMU_SPOOLMAN UPDATE=1 GATE={gate} SPOOLID={spool_id}


[gcode_macro _NFC_SPOOL_REMOVED]
description: Called by nfc_gates/nfc_gate when a spool NFC tag is removed from a gate
gcode:
    {% set gate = params.GATE | int %}
    { action_respond_info("🧹 NFC gate %d: spool removed. Clearing Happy Hare Spoolman gate." % gate) }
    MMU_SPOOLMAN UPDATE=1 GATE={gate} SPOOLID=-1


[gcode_macro _NFC_TAG_NO_SPOOL]
description: Called when a tag is detected but its UID is not registered in Spoolman
gcode:
    {% set gate = params.GATE | int %}
    {% set uid  = params.UID %}
    { action_respond_info(
        "NFC gate %d: tag UID %s is not registered in Spoolman.\n"
        "Open the spool record in Spoolman, set the 'rfid' extra field to: %s" %
        (gate, uid, uid)) }
    # Optionally clear the gate until the UID is registered:
    # MMU_SPOOLMAN UPDATE=1 GATE={gate} SPOOLID=-1
